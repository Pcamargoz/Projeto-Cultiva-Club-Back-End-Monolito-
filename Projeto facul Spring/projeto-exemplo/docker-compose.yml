version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_faculdade
    restart: always
    environment:
      - POSTGRES_DB=faculdade_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # imagem sendo criada atraves do terminal mesmo
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_faculdade
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  postgres_data: