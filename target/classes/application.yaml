# ============================================================
# CultivaClub - Monólito - Application Configuration
# ============================================================
# Estágio atual: SEM BANCO DE DADOS.
# A autoconfiguração de DataSource/JPA está desabilitada para que
# a aplicação suba sem precisar de Postgres. Quando o banco for
# introduzido, basta:
#   1) remover o bloco `spring.autoconfigure.exclude`
#   2) preencher a seção `spring.datasource` com URL/usuário/senha
# ============================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: CultivaClub-Monolito

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

app:
  jwt:
    secret: ${JWT_SECRET:changeme-dev-secret}
    expiration: ${JWT_EXPIRATION:86400000}
  cors:
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
